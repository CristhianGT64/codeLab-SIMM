services:
  postgres:
    image: postgres:16
    container_name: postgres # Se le añadió nombre fijo para evitar confusiones.
    restart: always
    ports:
      - "${PORT_POSTGRES}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest # Se cambió de snapshot a latest.
    user: root                   # Para solucionar el error de permisos en Windows
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: 'False' # Ayuda en local
    ports:
      - "${PORT_PGADMIN}:80"
    depends_on:
      - postgres

  backend:
    build:
      context: ./codelabBackEnd
      dockerfile: Dockerfile
    container_name: codelaberpbackend-container
    restart: unless-stopped
    env_file:
      - ./codelabBackEnd/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: sh -c "npx prisma migrate deploy && node src/app.js"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./codelabFrontEnd
      dockerfile: Dockerfile
    container_name: codelabfrontend-container
    restart: unless-stopped
    ports:
      - "4173:4173"
    depends_on:
      - backend

  

volumes:
  postgres_data: