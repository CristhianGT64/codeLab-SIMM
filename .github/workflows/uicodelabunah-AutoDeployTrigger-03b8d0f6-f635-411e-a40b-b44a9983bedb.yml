name: Trigger auto deployment for uicodelabunah

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/uicodelabunah-AutoDeployTrigger-03b8d0f6-f635-411e-a40b-b44a9983bedb.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.UICODELABUNAH_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.UICODELABUNAH_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.UICODELABUNAH_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}codelabFrontEnd
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: acrcodelaunah.azurecr.io
          registryUsername: ${{ secrets.UICODELABUNAH_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.UICODELABUNAH_REGISTRY_PASSWORD }}
          containerAppName: uicodelabunah
          resourceGroup: codelabUNAH
          imageToBuild: acrcodelaunah.azurecr.io/uicodelabunah:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


