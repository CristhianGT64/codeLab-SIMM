name: Trigger auto deployment for api-codelab-unah

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/api-codelab-unah-AutoDeployTrigger-f7903b62-5cad-4ea2-9ab8-cc40791f231d.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.APICODELABUNAH_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.APICODELABUNAH_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.APICODELABUNAH_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}codelabBackEnd
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: acrcodelaunah.azurecr.io
          registryUsername: ${{ secrets.APICODELABUNAH_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.APICODELABUNAH_REGISTRY_PASSWORD }}
          containerAppName: api-codelab-unah
          resourceGroup: codelabUNAH
          imageToBuild: acrcodelaunah.azurecr.io/api-codelab-unah:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


